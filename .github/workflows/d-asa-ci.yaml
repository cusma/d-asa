name: Validate d-asa

on:
  workflow_call:
  pull_request:
    # If not specified, types includes by default [opened, reopened, synchronize]
    # This next line should be used in conjunction with the if statement that prevents CI jobs to run on draft PRs.
    # ready_for_review is then added to make sure that a PR with no code change triggers CI if it's no longer a draft PR.
    types: [ opened, reopened, synchronize, ready_for_review ]

permissions:
  contents: read

jobs:
  validate:
    name: Validate d-asa
    # Preventing a job from running on draft PRs.
    if: '! github.event.pull_request.draft'
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up AlgoKit
        uses: ./.github/actions/algokit-setup

      - name: Audit python dependencies
        run: algokit project run audit

      - name: Lint and format python dependencies
        run: algokit project run lint

      - name: Build smart contracts
        run: algokit project run build

      - name: Check output stability of the smart contracts
        run: algokit project run ci-teal-diff

      - name: Run deployer against LocalNet
        run: algokit project deploy localnet

  test-mock-module-rbac:
    name: Test RBAC Module
    if: '! github.event.pull_request.draft'
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up AlgoKit
        uses: ./.github/actions/algokit-setup

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mock_module_rbac:
              - 'smart_contracts/artifacts/mock_module_rbac/**'
              - 'tests/conftest.py'
              - 'tests/mock_module_rbac/**'

      - name: Run tests
        if: steps.filter.outputs.mock_module_rbac == 'true'
        shell: bash
        run: |
          set -o pipefail
          algokit project run test tests/mock_module_rbac

  test-pam:
    name: Test PAM ${{ matrix.subfolder }}
    if: '! github.event.pull_request.draft'
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        subfolder:
          - fcb
          - zcb
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up AlgoKit
        uses: ./.github/actions/algokit-setup

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pam:
              - 'smart_contracts/artifacts/d_asa/**'
              - 'tests/conftest.py'
              - 'tests/conftest_helpers.py'
              - 'tests/pam/pam_test_support.py'
              - 'tests/pam/${{ matrix.subfolder }}/**'

      - name: Run tests
        if: steps.filter.outputs.pam == 'true'
        shell: bash
        run: |
          set -o pipefail
          algokit project run test tests/pam/${{ matrix.subfolder }}

  test-sdk:
    name: Test SDK and helpers
    if: '! github.event.pull_request.draft'
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up AlgoKit
        uses: ./.github/actions/algokit-setup

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - 'src/**'
              - 'smart_contracts/**'
              - 'tests/sdk/**'
              - 'tests/test_utils.py'

      - name: Run tests
        if: steps.filter.outputs.sdk == 'true'
        shell: bash
        run: |
          set -o pipefail
          algokit project run test tests/sdk tests/test_utils.py
